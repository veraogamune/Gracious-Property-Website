<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Register - Gracious Property</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .auth-section {
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 0;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            position: relative;
            overflow: hidden;
        }

        .auth-section::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(circle at 20% 50%, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(96, 165, 250, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .auth-container {
            width: 100%;
            max-width: 500px;
            padding: 0 20px;
            position: relative;
            z-index: 1;
        }

        .auth-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 25px;
            padding: 3rem;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.4);
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-logo .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1rem;
            font-size: 1.8rem;
            color: white;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
        }

        .auth-logo h2 {
            font-size: 1.5rem;
            background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        .auth-logo p {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-top: 0.3rem;
        }

        /* Tabs */
        .auth-tabs {
            display: flex;
            background: rgba(15, 23, 42, 0.7);
            border-radius: 12px;
            padding: 5px;
            margin-bottom: 2rem;
        }

        .auth-tab {
            flex: 1;
            padding: 0.8rem;
            border: none;
            background: transparent;
            color: #94a3b8;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .auth-tab.active {
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            color: white;
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4);
        }

        /* Forms */
        .auth-form { display: none; }
        .auth-form.active { display: block; }

        .auth-form .form-group {
            margin-bottom: 1.2rem;
        }

        .auth-form label {
            display: block;
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .auth-form input {
            width: 100%;
            padding: 1rem 1.5rem;
            background: rgba(15, 23, 42, 0.7);
            border: 2px solid rgba(59, 130, 246, 0.3);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.3s;
        }

        .auth-form input::placeholder { color: #64748b; }

        .auth-form input:focus {
            border-color: #3b82f6;
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .auth-submit {
            width: 100%;
            background: linear-gradient(135deg, #3b82f6 0%, #1e40af 100%);
            color: white;
            padding: 1.1rem;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
        }

        .auth-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(59, 130, 246, 0.5);
        }

        .auth-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #ef4444;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
        }

        .auth-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
            padding: 0.8rem 1rem;
            border-radius: 10px;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: none;
        }

        .form-divider {
            text-align: center;
            color: #64748b;
            font-size: 0.85rem;
            margin: 1.5rem 0;
            position: relative;
        }

        .form-divider::before, .form-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: rgba(59, 130, 246, 0.2);
        }

        .form-divider::before { left: 0; }
        .form-divider::after { right: 0; }

        .redirect-note {
            text-align: center;
            color: #94a3b8;
            font-size: 0.85rem;
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(59, 130, 246, 0.05);
            border-radius: 10px;
            border: 1px solid rgba(59, 130, 246, 0.1);
        }

        .redirect-note i { color: #3b82f6; margin-right: 0.3rem; }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <img src="images/logo.png" alt="Gracious Property Logo">
                <h2>Gracious Property</h2>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="real-estate.html">Real Estate</a></li>
                <li><a href="apartment.html">Next Level Apartment</a></li>
                <li><a href="digital-services.html">Digital Services</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
            <div class="social-icons">
                <a href="#"><i class="fab fa-facebook"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-linkedin"></i></a>
            </div>
        </div>
    </nav>

    <!-- Auth Section -->
    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-logo">
                    <div class="logo-icon"><i class="fas fa-user-circle"></i></div>
                    <h2>Gracious Property</h2>
                    <p>Your account to manage bookings & services</p>
                </div>

                <!-- Tabs -->
                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="switchAuthTab('login')">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                    <button class="auth-tab" onclick="switchAuthTab('register')">
                        <i class="fas fa-user-plus"></i> Register
                    </button>
                </div>

                <!-- Login Form -->
                <div class="auth-form active" id="loginForm">
                    <div class="auth-error" id="loginError"></div>
                    <div class="auth-success" id="loginSuccess"></div>

                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="loginEmail" placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter your password">
                    </div>
                    <button class="auth-submit" onclick="handleLogin()">
                        <i class="fas fa-sign-in-alt"></i> Login to My Account
                    </button>
                </div>

                <!-- Register Form -->
                <div class="auth-form" id="registerForm">
                    <div class="auth-error" id="registerError"></div>
                    <div class="auth-success" id="registerSuccess"></div>

                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="regName" placeholder="Enter your full name">
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="regEmail" placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="tel" id="regPhone" placeholder="Enter your phone number">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="regPassword" placeholder="Create a password (min. 6 characters)">
                    </div>
                    <button class="auth-submit" onclick="handleRegister()">
                        <i class="fas fa-user-plus"></i> Create My Account
                    </button>
                </div>

                <div class="redirect-note" id="redirectNote" style="display:none">
                    <i class="fas fa-info-circle"></i>
                    <span id="redirectMsg">You need an account to book a service.</span>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Gracious Property. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script>
        // Check if user was redirected from a booking page
        const urlParams = new URLSearchParams(window.location.search);
        const redirectTo = urlParams.get('redirect');

        if (redirectTo) {
            document.getElementById('redirectNote').style.display = 'block';
            if (redirectTo === 'apartment') {
                document.getElementById('redirectMsg').textContent = 'Please login or register to book an apartment.';
            } else if (redirectTo === 'digital') {
                document.getElementById('redirectMsg').textContent = 'Please login or register to book a digital service.';
            }
        }

        function switchAuthTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            document.getElementById(tab + 'Form').classList.add('active');
            event.target.closest('.auth-tab').classList.add('active');
        }

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            const errorEl = document.getElementById('loginError');
            const successEl = document.getElementById('loginSuccess');

            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            if (!email || !password) {
                errorEl.textContent = 'Please fill in all fields.';
                errorEl.style.display = 'block';
                return;
            }

            try {
                const res = await fetch('http://localhost:3000/api/users/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const result = await res.json();

                if (result.success) {
                    localStorage.setItem('userToken', result.token);
                    localStorage.setItem('userData', JSON.stringify(result.user));

                    successEl.textContent = 'Login successful! Redirecting...';
                    successEl.style.display = 'block';

                    setTimeout(() => {
                        if (redirectTo === 'apartment') window.location.href = 'apartment.html';
                        else if (redirectTo === 'digital') window.location.href = 'digital-services.html';
                        else window.location.href = 'user-dashboard.html';
                    }, 1000);
                } else {
                    errorEl.textContent = result.message;
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = 'Could not connect to server. Please try again.';
                errorEl.style.display = 'block';
            }
        }

        async function handleRegister() {
            const fullName = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const password = document.getElementById('regPassword').value.trim();
            const errorEl = document.getElementById('registerError');
            const successEl = document.getElementById('registerSuccess');

            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            if (!fullName || !email || !phone || !password) {
                errorEl.textContent = 'Please fill in all fields.';
                errorEl.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                errorEl.textContent = 'Password must be at least 6 characters.';
                errorEl.style.display = 'block';
                return;
            }

            try {
                const res = await fetch('http://localhost:3000/api/users/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fullName, email, phone, password })
                });

                const result = await res.json();

                if (result.success) {
                    localStorage.setItem('userToken', result.token);
                    localStorage.setItem('userData', JSON.stringify(result.user));

                    successEl.textContent = 'Account created successfully! Redirecting...';
                    successEl.style.display = 'block';

                    setTimeout(() => {
                        if (redirectTo === 'apartment') window.location.href = 'apartment.html';
                        else if (redirectTo === 'digital') window.location.href = 'digital-services.html';
                        else window.location.href = 'user-dashboard.html';
                    }, 1000);
                } else {
                    errorEl.textContent = result.message;
                    errorEl.style.display = 'block';
                }
            } catch (err) {
                errorEl.textContent = 'Could not connect to server. Please try again.';
                errorEl.style.display = 'block';
            }
        }

        // Allow Enter key
        document.addEventListener('keypress', e => {
            if (e.key === 'Enter') {
                const activeForm = document.querySelector('.auth-form.active').id;
                if (activeForm === 'loginForm') handleLogin();
                else handleRegister();
            }
        });

        // If already logged in, redirect to dashboard
        if (localStorage.getItem('userToken') && !redirectTo) {
            window.location.href = 'user-dashboard.html';
        }
    </script>
    <script>
    // Smart navbar — show Dashboard if logged in
    const userToken = localStorage.getItem('userToken');
    const userDataNav = JSON.parse(localStorage.getItem('userData') || '{}');
    const accountBtn = document.querySelector('.my-account-btn');

    if (accountBtn && userToken) {
        accountBtn.href = 'user-dashboard.html';
        accountBtn.innerHTML = '<i class="fas fa-user-circle"></i> ' + (userDataNav.fullName ? userDataNav.fullName.split(' ')[0] : 'Dashboard');
    }
</script>
</body>
</html>
